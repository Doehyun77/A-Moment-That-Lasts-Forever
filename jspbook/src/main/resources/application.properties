app.storage.root-dir=var
app.storage.upload-dir=${app.storage.root-dir}/uploads
app.storage.temp-dir=${app.storage.root-dir}/tmp
spring.servlet.multipart.location=${app.storage.temp-dir}
spring.datasource.url=jdbc:mysql://localhost:3306/jspbook?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
